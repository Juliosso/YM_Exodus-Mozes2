<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YM Trailer - EXODUS</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; background-color: #000;
            color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        #trailerVideo {
            position: absolute; top: 0; left: 0; 
            width: 100vw; height: 100vh;
            object-fit: cover; 
            /* Standaard voor desktop: inzoomen om zwarte balken te verbergen */
            transform: scale(1.35); 
            opacity: 0; transition: opacity 3s ease-in-out;
            z-index: 1;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 2; pointer-events: none;
        }

        .cinematic-text {
            position: absolute; z-index: 3; 
            /* Slimme font-size: minimaal 18px, ideaal 3vw, maximaal 40px */
            font-size: clamp(18px, 3vw, 40px); 
            font-weight: 300;
            letter-spacing: 10px; text-transform: uppercase; text-align: center;
            opacity: 0; transition: opacity 2s ease-in-out;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
            padding: 0 20px; /* Zorgt dat tekst nooit de rand van het scherm raakt */
            box-sizing: border-box;
            width: 100%;
        }

        #text4 {
            /* EXODUS titel moet groter zijn */
            font-size: clamp(35px, 6vw, 80px); 
            font-weight: bold;
        }

        #startBtn {
            z-index: 10; padding: 15px 40px; font-size: 18px; color: #fff;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; letter-spacing: 3px; text-transform: uppercase;
            transition: all 0.3s ease;
        }
        #startBtn:hover { background: rgba(255,255,255,0.3); }

        /* --- MOBIELE FIX (Voor iPhone & andere telefoons in portretstand) --- */
        @media (orientation: portrait) {
            #trailerVideo {
                /* Op mobiel zorgt object-fit: cover er zélf al voor dat boven/onder balken wegvallen. 
                   De scale kan dus uit (of veel lager) om extreem inzoomen te voorkomen. */
                transform: scale(1.05); 
                object-position: center center;
            }
            .cinematic-text {
                letter-spacing: 5px; /* Iets minder ruimte tussen letters op smalle schermen */
            }
            #startBtn {
                font-size: 14px; padding: 12px 30px; /* Iets kleinere knop op mobiel */
            }
        }
    </style>
</head>
<body>

    <video id="trailerVideo" src="mosespv.mp4" muted playsinline webkit-playsinline></video>
    <audio id="epicMusic" src="Celestial_Ascent2.mp3"></audio>

    <div class="overlay"></div>
    <button id="startBtn">Speel Trailer Af</button>

    <div id="text1" class="cinematic-text">400 jaar slavernij...</div>
    <div id="text2" class="cinematic-text">Eén man.<br>Eén roeping.</div>
    <div id="text3" class="cinematic-text">Het machtigste rijk<br>op aarde...</div>
    <div id="text4" class="cinematic-text">EXODUS</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const video = document.getElementById('trailerVideo');
    const music = document.getElementById('epicMusic');
    const t1 = document.getElementById('text1');
    const t2 = document.getElementById('text2');
    const t3 = document.getElementById('text3');
    const t4 = document.getElementById('text4');

    let timeouts = [];

    function startCinematic() {
        t1.style.opacity = 0;
        t2.style.opacity = 0;
        t3.style.opacity = 0;
        t4.style.opacity = 0;
        video.style.opacity = 0;

        video.currentTime = 0;
        music.currentTime = 0;

        music.volume = 1; 
        music.play().catch(()=>{});

        // Tijdlijn
        timeouts.push(setTimeout(() => { t1.style.opacity = 1; }, 1000));
        timeouts.push(setTimeout(() => { t1.style.opacity = 0; }, 5000)); 

        timeouts.push(setTimeout(() => { t2.style.opacity = 1; }, 5500));
        timeouts.push(setTimeout(() => { t2.style.opacity = 0; }, 9500)); 

        timeouts.push(setTimeout(() => { 
            t3.style.opacity = 1;
            video.play().catch(()=>{});
            video.style.opacity = 0.5;
        }, 10000));

        timeouts.push(setTimeout(() => { t3.style.opacity = 0; }, 14000)); 

        timeouts.push(setTimeout(() => { 
            t4.style.opacity = 1;
            video.style.opacity = 1;
        }, 15000));

        timeouts.push(setTimeout(() => { t4.style.opacity = 0; }, 21000)); 
    }

    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none';
        // IOS Media Unlock
        video.play().then(() => { video.pause(); }).catch(()=>{});
        startCinematic();
    });

    video.addEventListener('ended', () => {
        timeouts.forEach(clearTimeout);
        timeouts = [];
        video.style.opacity = 0;

        let fadeAudio = setInterval(() => {
            if (music.volume > 0.05) {
                music.volume -= 0.05; 
            } else {
                clearInterval(fadeAudio);
                music.pause();
            }
        }, 150); 

        setTimeout(() => {
            clearInterval(fadeAudio); 
            startCinematic();
        }, 3000);
    });

</script>

</body>
</html>
