<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YM Trailer - EXODUS</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%; background-color: #000;
            color: #fff; font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow: hidden; display: flex; justify-content: center; align-items: center;
        }

        #trailerVideo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0; transition: opacity 3s ease-in-out;
            z-index: 1;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.8) 100%);
            z-index: 2; pointer-events: none;
        }

        .cinematic-text {
            position: absolute; z-index: 3; font-size: 3vw; font-weight: 300;
            letter-spacing: 10px; text-transform: uppercase; text-align: center;
            opacity: 0; transition: opacity 2s ease-in-out;
            text-shadow: 2px 2px 10px rgba(0,0,0,1);
        }

        #startBtn {
            z-index: 10; padding: 15px 40px; font-size: 18px; color: #fff;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3);
            cursor: pointer; letter-spacing: 3px; text-transform: uppercase;
            transition: all 0.3s ease;
        }
        #startBtn:hover { background: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

    <video id="trailerVideo" src="moses.mp4" muted></video>
    <audio id="epicMusic" src="Celestial_Ascent2.mp3"></audio>

    <div class="overlay"></div>
    <button id="startBtn">Speel Trailer Af</button>

    <div id="text1" class="cinematic-text">400 jaar slavernij...</div>
    <div id="text2" class="cinematic-text">Eén man. Eén roeping.</div>
    <div id="text3" class="cinematic-text">Het machtigste rijk op aarde...</div>
    <div id="text4" class="cinematic-text" style="font-size: 5vw; font-weight: bold;">EXODUS</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const video = document.getElementById('trailerVideo');
    const music = document.getElementById('epicMusic');
    const t1 = document.getElementById('text1');
    const t2 = document.getElementById('text2');
    const t3 = document.getElementById('text3');
    const t4 = document.getElementById('text4');

    let timeouts = [];

    function startCinematic() {
        // Reset alles
        t1.style.opacity = 0;
        t2.style.opacity = 0;
        t3.style.opacity = 0;
        t4.style.opacity = 0;
        video.style.opacity = 0;

        video.currentTime = 0;
        music.currentTime = 0;

        // Zorg dat het muziekvolume weer op 100% staat
        music.volume = 1; 
        music.play().catch(()=>{});

        // Tijdlijn
        timeouts.push(setTimeout(() => { t1.style.opacity = 1; }, 1000));
        timeouts.push(setTimeout(() => { t1.style.opacity = 0; }, 4000));

        timeouts.push(setTimeout(() => { t2.style.opacity = 1; }, 5500));
        timeouts.push(setTimeout(() => { t2.style.opacity = 0; }, 8500));

        timeouts.push(setTimeout(() => { 
            t3.style.opacity = 1;
            video.play().catch(()=>{});
            video.style.opacity = 0.5;
        }, 10000));

        timeouts.push(setTimeout(() => { t3.style.opacity = 0; }, 13000));

        timeouts.push(setTimeout(() => { 
            t4.style.opacity = 1;
            video.style.opacity = 1;
        }, 15000));

        timeouts.push(setTimeout(() => { t4.style.opacity = 0; }, 20000));
    }

    startBtn.addEventListener('click', () => {
        startBtn.style.display = 'none';
        startCinematic();
    });

    // 🔁 AANGEPAST: Smooth overgang aan het einde
    video.addEventListener('ended', () => {
        // 1. Stop alle geplande tekst-animaties
        timeouts.forEach(clearTimeout);
        timeouts = [];

        // 2. Fade de video uit. 
        // Omdat we currentTime nog niet resetten, blijft hij mooi op de laatste frame staan!
        video.style.opacity = 0;

        // 3. Fade de muziek langzaam uit in 3 seconden, anders stopt deze heel abrupt.
        let fadeAudio = setInterval(() => {
            if (music.volume > 0.05) {
                music.volume -= 0.05; // Zet volume steeds een klein beetje zachter
            } else {
                clearInterval(fadeAudio);
                music.pause();
            }
        }, 150); // (20 stappen * 150ms = 3000ms totaal)

        // 4. Wacht exact 3 seconden (de lengte van je CSS transition) en start dan pas de cinematic opnieuw
        setTimeout(() => {
            clearInterval(fadeAudio); 
            startCinematic();
        }, 3000);
    });

</script>

</body>
</html>
